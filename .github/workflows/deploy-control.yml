name: Deploy Control Plane

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Deployment run id"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Block direct production deploy from workflow
        if: ${{ inputs.environment == 'production' }}
        run: |
          echo "Production deploy must be triggered only via approved control-plane with ALLOW_PRODUCTION_DEPLOY=true."
          exit 1

      - name: Placeholder deploy gate
        run: |
          echo "Deployment orchestration for run_id=${{ inputs.run_id }} env=${{ inputs.environment }}"
          echo "This workflow is intentionally non-destructive by default."
